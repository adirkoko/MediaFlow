<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediaFlow</title>
    <meta
      name="description"
      content="Preview media, choose audio or video, and track downloads in one clean flow."
    />
    <meta name="theme-color" content="#10b981" />
    <meta name="application-name" content="MediaFlow" />
    <meta name="apple-mobile-web-app-title" content="MediaFlow" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/assets/icon-192.png" />
    <link rel="manifest" href="/assets/site.webmanifest" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MediaFlow" />
    <meta property="og:title" content="MediaFlow" />
    <meta
      property="og:description"
      content="Preview media, choose audio or video, and track downloads in one clean flow."
    />
    <meta property="og:url" content="__MEDIAFLOW_PUBLIC_URL__/" />
    <meta property="og:image" content="__MEDIAFLOW_PUBLIC_URL__/assets/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MediaFlow" />
    <meta
      name="twitter:description"
      content="Preview media, choose audio or video, and track downloads in one clean flow."
    />
    <meta name="twitter:image" content="__MEDIAFLOW_PUBLIC_URL__/assets/og-image.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --ink: 15 23 42;
        --mist: 241 245 249;
        --brand: 16 185 129;
        --accent: 59 130 246;
        --sun: 245 158 11;
      }

      body {
        font-family: "Space Grotesk", system-ui, -apple-system, Segoe UI, sans-serif;
      }

      .panel {
        border: 1px solid rgba(226, 232, 240, 0.9);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 16px 50px rgba(15, 23, 42, 0.08);
        backdrop-filter: blur(12px);
      }

      .soft {
        border: 1px solid rgba(226, 232, 240, 0.9);
        border-radius: 8px;
        background: rgba(248, 250, 252, 0.72);
      }

      .btn,
      .btn-primary,
      .mode-btn,
      .quality-btn {
        border-radius: 8px;
        transition:
          transform 0.08s ease,
          box-shadow 0.2s ease,
          background 0.2s ease,
          border-color 0.2s ease;
      }

      .btn {
        border: 1px solid rgba(226, 232, 240, 0.95);
        background: rgba(255, 255, 255, 0.82);
        padding: 0.65rem 1rem;
        color: rgb(var(--ink));
        box-shadow: 0 6px 16px rgba(15, 23, 42, 0.07);
      }

      .btn-primary {
        background: linear-gradient(135deg, rgb(var(--brand)), rgb(var(--accent)));
        padding: 0.7rem 1.1rem;
        color: white;
        box-shadow: 0 12px 24px rgba(16, 185, 129, 0.25);
      }

      .btn:hover,
      .btn-primary:hover,
      .mode-btn:hover,
      .quality-btn:hover {
        transform: translateY(-1px);
      }

      .btn:active,
      .btn-primary:active,
      .mode-btn:active,
      .quality-btn:active {
        transform: translateY(1px) scale(0.99);
      }

      .mode-btn,
      .quality-btn {
        border: 1px solid rgba(203, 213, 225, 0.9);
        background: rgba(255, 255, 255, 0.72);
        color: rgb(71 85 105);
      }

      .mode-btn.active,
      .quality-btn.active {
        border-color: rgba(16, 185, 129, 0.6);
        background: rgba(16, 185, 129, 0.12);
        color: rgb(5 150 105);
        box-shadow: 0 10px 20px rgba(16, 185, 129, 0.12);
      }

      .job-row {
        border: 1px solid rgba(226, 232, 240, 0.9);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.62);
      }

      .job-row.active {
        border-color: rgba(59, 130, 246, 0.45);
        background: rgba(239, 246, 255, 0.8);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.58;
      }

      .timestamp {
        display: inline-flex;
        gap: 0.8rem;
        white-space: nowrap;
      }

      .copy-toast {
        opacity: 0;
        transform: translateY(6px);
      }

      .copy-toast.show {
        animation: toastFade 1.15s ease forwards;
      }

      .running-mark {
        animation: progressPulse 1.6s ease-in-out infinite;
      }

      .busy-dot {
        animation: busyPulse 0.9s ease-in-out infinite alternate;
      }

      @keyframes progressPulse {
        0%,
        100% {
          opacity: 0.72;
        }
        50% {
          opacity: 1;
        }
      }

      @keyframes busyPulse {
        from {
          transform: scale(0.72);
          opacity: 0.55;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      @keyframes toastFade {
        0% {
          opacity: 0;
          transform: translateY(6px);
        }
        15%,
        72% {
          opacity: 1;
          transform: translateY(0);
        }
        100% {
          opacity: 0;
          transform: translateY(-2px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body class="min-h-screen bg-[radial-gradient(circle_at_top,_#ffffff,_#e2e8f0_46%,_#e9eff7_72%,_#f8fafc_100%)] text-slate-900">
    <main class="mx-auto grid min-h-screen max-w-7xl content-start gap-5 px-4 py-4 sm:px-6 lg:px-8 lg:py-7">
      <header class="panel grid gap-4 p-4 md:grid-cols-[1fr_auto] md:items-center">
        <div class="min-w-0">
          <div class="flex flex-wrap items-center gap-3">
            <h1 class="text-3xl font-semibold tracking-normal sm:text-4xl">MediaFlow</h1>
            <span id="api-base-label" class="rounded-full bg-slate-900 px-3 py-1 text-xs text-white">/api</span>
            <span id="token-pill" class="rounded-full bg-slate-100 px-3 py-1 text-xs text-slate-600">Signed out</span>
          </div>
        </div>

        <div class="grid gap-2 sm:grid-cols-[minmax(0,150px)_minmax(0,150px)_auto_auto]">
          <input
            id="username"
            class="h-10 rounded-lg border border-slate-200 bg-white/85 px-3 text-sm outline-none focus:border-emerald-400"
            placeholder="Username"
            autocomplete="username"
          />
          <input
            id="password"
            type="password"
            class="h-10 rounded-lg border border-slate-200 bg-white/85 px-3 text-sm outline-none focus:border-emerald-400"
            placeholder="Password"
            autocomplete="current-password"
          />
          <button id="btn-login" class="btn-primary h-10 px-4 text-sm font-medium">Login</button>
          <button id="btn-logout" class="btn h-10 px-4 text-sm font-medium">Logout</button>
          <div id="auth-message" class="hidden text-sm sm:col-span-4"></div>
        </div>
      </header>

      <section class="grid gap-5 xl:grid-cols-[minmax(0,1.15fr)_minmax(360px,0.85fr)]">
        <div class="grid gap-5">
          <section class="panel p-4 sm:p-5">
            <div class="grid gap-3 md:grid-cols-[minmax(0,1fr)_auto] md:items-end">
              <label class="grid gap-2 text-sm font-medium text-slate-700">
                <span>Link</span>
                <input
                  id="job-url"
                  class="h-12 rounded-lg border border-slate-200 bg-white/90 px-4 text-base text-slate-900 outline-none focus:border-emerald-400"
                  placeholder="https://www.youtube.com/watch?v=..."
                  inputmode="url"
                />
              </label>
              <button id="btn-preview" class="btn h-12 px-5 text-sm font-semibold">Preview</button>
            </div>

            <div id="preview-loading" class="mt-4 hidden soft p-4">
              <div class="flex items-center gap-3 text-sm text-slate-600">
                <span class="busy-dot h-2.5 w-2.5 rounded-full bg-emerald-500"></span>
                <span>Loading preview</span>
              </div>
            </div>

            <div id="preview-empty" class="mt-4 soft p-4 text-sm text-slate-500">Awaiting preview</div>
            <div id="preview-message" class="mt-3 hidden text-sm"></div>

            <article id="preview-card" class="mt-4 hidden soft overflow-hidden">
              <div class="grid gap-0 md:grid-cols-[220px_minmax(0,1fr)]">
                <div class="aspect-video bg-slate-200 md:aspect-auto">
                  <img id="preview-thumb" class="h-full w-full object-cover" alt="" />
                </div>
                <div class="grid gap-4 p-4">
                  <div class="min-w-0">
                    <div class="flex flex-wrap gap-2">
                      <span id="preview-kind" class="rounded-full bg-slate-900 px-2.5 py-1 text-[11px] text-white">video</span>
                      <span id="preview-duration" class="rounded-full bg-slate-100 px-2.5 py-1 text-[11px] text-slate-600">--</span>
                      <span id="preview-size" class="rounded-full bg-slate-100 px-2.5 py-1 text-[11px] text-slate-600">--</span>
                    </div>
                    <h2 id="preview-title" class="mt-3 break-words text-xl font-semibold leading-tight text-slate-950"></h2>
                    <p id="preview-meta" class="mt-2 text-sm text-slate-600"></p>
                  </div>

                  <div class="grid gap-4 lg:grid-cols-[220px_minmax(0,1fr)]">
                    <div>
                      <div class="mb-2 text-xs font-semibold uppercase tracking-wide text-slate-500">Output</div>
                      <div class="grid grid-cols-2 gap-2">
                        <button id="mode-audio" class="mode-btn active px-3 py-2 text-sm font-semibold" data-mode="audio">Audio</button>
                        <button id="mode-video" class="mode-btn px-3 py-2 text-sm font-semibold" data-mode="video">Video</button>
                      </div>
                    </div>

                    <div id="quality-panel" class="hidden">
                      <div class="mb-2 flex items-center justify-between gap-3">
                        <span class="text-xs font-semibold uppercase tracking-wide text-slate-500">Quality</span>
                        <span id="quality-note" class="text-xs text-slate-500"></span>
                      </div>
                      <div id="quality-options" class="flex flex-wrap gap-2"></div>
                    </div>
                  </div>

                  <div class="flex flex-wrap items-center gap-3">
                    <button id="btn-create" class="btn-primary min-h-11 px-5 text-sm font-semibold" disabled>
                      Start Download
                    </button>
                    <span id="create-result" class="text-sm text-slate-600"></span>
                  </div>
                </div>
              </div>
            </article>
          </section>

          <section class="panel p-4 sm:p-5">
            <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
              <div>
                <h2 class="text-lg font-semibold">Current Job</h2>
                <p id="selected-job-label" class="text-sm text-slate-500">No job selected</p>
              </div>
              <div class="flex flex-wrap gap-2">
                <button id="btn-cancel" class="btn px-3 py-2 text-sm">Cancel</button>
                <button id="btn-download" class="btn-primary px-3 py-2 text-sm">Download</button>
                <button id="btn-copy-stats" class="btn px-3 py-2 text-sm">Copy Job JSON</button>
              </div>
            </div>

            <div class="soft p-4">
              <div class="flex flex-wrap items-center justify-between gap-3 text-sm">
                <div class="flex min-w-0 items-center gap-2">
                  <span id="live-status" class="rounded-full bg-slate-100 px-2.5 py-1 text-xs text-slate-600">idle</span>
                  <span id="live-stage" class="truncate text-slate-700">idle</span>
                </div>
                <div class="flex flex-wrap items-center gap-x-4 gap-y-1 text-xs text-slate-500">
                  <span id="live-percent">0%</span>
                  <span id="live-eta">ETA --</span>
                  <span id="live-speed">Speed --</span>
                </div>
              </div>
              <div class="mt-3 h-2.5 w-full overflow-hidden rounded-full bg-slate-200">
                <div
                  id="live-bar"
                  class="h-2.5 w-0 rounded-full bg-gradient-to-r from-emerald-400 via-blue-500 to-indigo-500 transition-all duration-500"
                ></div>
              </div>
              <div id="job-facts" class="mt-4 grid gap-2 text-sm text-slate-600 sm:grid-cols-3"></div>
              <div id="job-output" class="mt-3 hidden rounded-lg bg-white/70 p-3"></div>
              <div id="job-message" class="mt-3 hidden text-sm"></div>
            </div>
          </section>
        </div>

        <aside class="panel p-4 sm:p-5">
          <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
            <div>
              <h2 class="text-lg font-semibold">Recent Jobs</h2>
              <p id="refresh-label" class="text-sm text-slate-500">Idle</p>
            </div>
            <button id="btn-refresh" class="btn px-3 py-2 text-sm">Refresh</button>
          </div>
          <div id="jobs-message" class="mb-3 hidden text-sm"></div>
          <div id="jobs-list" class="grid max-h-[660px] gap-3 overflow-auto pr-1"></div>
        </aside>
      </section>
    </main>

    <div
      id="copy-toast"
      class="copy-toast pointer-events-none fixed bottom-5 right-5 hidden rounded-lg bg-slate-900 px-3 py-2 text-sm font-medium text-white shadow-lg"
    >
      Copied
    </div>

    <script src="./js/runtime-config.js"></script>
    <script src="./js/main.js"></script>
  </body>
</html>
